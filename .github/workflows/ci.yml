name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.94", stable]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install Rust ${{ matrix.rust }}
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: ${{ matrix.rust }}
      - name: Test workspace
        run: cargo test --workspace --all-targets --all-features

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Validate CI policy
        run: python3 .github/scripts/validate_ci_policy.py
      - name: Validate artifact policy
        run: python3 .github/scripts/validate_artifact_policy.py
      - name: Validate einsum release completeness
        run: python3 .github/scripts/validate_einsum_release.py
      - name: Validate Python parity policy
        run: python3 .github/scripts/validate_python_parity_policy.py
      - name: Validate performance harness policy
        run: python3 .github/scripts/validate_performance_harness_policy.py
      - name: Test advisory benchmark comparison contract
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 .github/scripts/test_compare_benchmarks.py
      - name: Test benchmark execution and capture contract
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 .github/scripts/test_run_benchmarks.py
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        # These existing source/test warnings are outside this tooling ticket.
        # Keep every other warning CI-fatal while follow-up work removes them.
        run: >-
          cargo clippy --workspace --all-targets --all-features --
          -D warnings
          -A dead-code
          -A clippy::excessive-precision
          -A clippy::identity-op
          -A clippy::map-flatten
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps
      - name: Test documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo test --doc --workspace --all-features

  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Package, unpack, and test workspace crates
        run: python3 .github/scripts/test_published_artifacts.py

  python-parity:
    name: Python einops parity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CANDLE_EINOPS_PARITY_CASES: "64"
      CANDLE_EINOPS_PARITY_SEED: "6840158760032202765"
      CANDLE_EINOPS_PARITY_MAX_ELEMENTS: "512"
      UV_MANAGED_PYTHON: "1"
      UV_NO_BUILD: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Install pinned uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12.10"
          enable-cache: true
          cache-dependency-glob: parity/uv.lock
          cache-python: true
      - name: Run locked Python einops parity
        run: python3 .github/scripts/test_python_parity.py

  performance-harness:
    name: Performance harness structural smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install Rust 1.94
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.94"
      - name: Compile locked standalone performance harness
        run: python3 .github/scripts/run_benchmarks.py compile
      - name: Run correctness and structural smoke contracts
        run: python3 .github/scripts/run_benchmarks.py smoke
      - name: Compile locked MKL performance harness
        run: python3 .github/scripts/run_benchmarks.py compile --cpu-implementation mkl
      - name: Run MKL correctness and structural smoke contracts
        run: python3 .github/scripts/run_benchmarks.py smoke --cpu-implementation mkl

  performance-cuda-build:
    name: Performance harness CUDA compile
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container: nvidia/cuda:12.8.1-devel-ubuntu24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install Rust 1.94
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.94"
      - name: Compile locked CUDA performance harness without runtime claims
        run: python3 .github/scripts/run_benchmarks.py compile --backend cuda

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run cargo deny check
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: --all-features

  macos:
    name: Representative macOS tests
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
      - name: Test representative runtime behavior
        run: cargo test -p candle-einops --lib --test behavior --test errors
      - name: Install Rust 1.94 for the locked performance harness
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.94"
      - name: Compile locked Accelerate performance harness
        run: python3 .github/scripts/run_benchmarks.py compile --cpu-implementation accelerate
      - name: Run Accelerate smoke (known Candle stride-zero failure)
        id: accelerate-smoke
        continue-on-error: true
        run: python3 .github/scripts/run_benchmarks.py smoke --cpu-implementation accelerate
      - name: Surface known upstream Accelerate smoke issue
        if: steps.accelerate-smoke.outcome == 'failure'
        run: >-
          echo "::warning title=Known Candle stride-zero matmul issue::
          Accelerate differs from the baseline CPU provider;
          see https://github.com/huggingface/candle/issues/3744"
      - name: Compile locked Metal performance harness without runtime claims
        run: python3 .github/scripts/run_benchmarks.py compile --backend metal
