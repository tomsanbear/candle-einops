name: Advisory performance comparison

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: Exact 40-character base commit SHA
        required: true
        type: string
      head_sha:
        description: Exact 40-character head commit SHA
        required: true
        type: string
      benchmark_filter:
        description: Optional scenario-id substring
        required: false
        type: string

permissions:
  contents: read

jobs:
  compare:
    name: Advisory-only base/head evidence
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BASE_SHA: ${{ inputs.base_sha }}
      HEAD_SHA: ${{ inputs.head_sha }}
      BENCHMARK_FILTER: ${{ inputs.benchmark_filter }}
      RESULTS: ${{ github.workspace }}/target/advisory-performance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust 1.94
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: "1.94"
      - name: Validate exact commits and create isolated read-only checkouts
        shell: bash
        run: |
          set -euo pipefail
          exact_sha='^[0-9a-fA-F]{40}$'
          [[ "$BASE_SHA" =~ $exact_sha ]] || { echo "base_sha must be an exact SHA" >&2; exit 2; }
          [[ "$HEAD_SHA" =~ $exact_sha ]] || { echo "head_sha must be an exact SHA" >&2; exit 2; }
          [[ "$(git cat-file -t "$BASE_SHA")" == commit ]] || { echo "base_sha must identify a commit object" >&2; exit 2; }
          [[ "$(git cat-file -t "$HEAD_SHA")" == commit ]] || { echo "head_sha must identify a commit object" >&2; exit 2; }
          git cat-file -e "$BASE_SHA^{commit}"
          git cat-file -e "$HEAD_SHA^{commit}"
          base_sha="$(git rev-parse "$BASE_SHA^{commit}")"
          head_sha="$(git rev-parse "$HEAD_SHA^{commit}")"
          base_worktree="$RUNNER_TEMP/candle-einops-performance-base"
          head_worktree="$RUNNER_TEMP/candle-einops-performance-head"
          git worktree add --detach "$base_worktree" "$base_sha"
          git worktree add --detach "$head_worktree" "$head_sha"
          {
            echo "BASE_SHA=$base_sha"
            echo "HEAD_SHA=$head_sha"
            echo "BASE_WORKTREE=$base_worktree"
            echo "HEAD_WORKTREE=$head_worktree"
          } >> "$GITHUB_ENV"
          mkdir -p "$RESULTS/json/base" "$RESULTS/json/head"
      - name: Run five alternating independent process pairs
        shell: bash
        run: |
          set -euo pipefail
          run_side() {
            local side="$1"
            local worktree="$2"
            local pair="$3"
            local target="$RESULTS/build/$side"
            local arguments=(cargo +1.94 run --locked --manifest-path benchmarks/Cargo.toml --bin harness --)
            arguments+=(--samples 25 --output "$RESULTS/json/$side/run-$pair.json")
            if [[ -n "$BENCHMARK_FILTER" ]]; then
              arguments+=(--filter "$BENCHMARK_FILTER")
            fi
            (cd "$worktree" && CARGO_TARGET_DIR="$target" "${arguments[@]}")
          }
          for pair in $(seq 1 5); do
            if (( pair % 2 == 1 )); then
              run_side base "$BASE_WORKTREE" "$pair"
              run_side head "$HEAD_WORKTREE" "$pair"
            else
              run_side head "$HEAD_WORKTREE" "$pair"
              run_side base "$BASE_WORKTREE" "$pair"
            fi
          done
      - name: Collect secondary Criterion artifacts
        shell: bash
        run: |
          set -euo pipefail
          run_criterion() {
            local side="$1"
            local worktree="$2"
            local target="$RESULTS/criterion/$side"
            local arguments=(cargo +1.94 bench --locked --manifest-path benchmarks/Cargo.toml --bench measurement --)
            if [[ -n "$BENCHMARK_FILTER" ]]; then
              arguments+=("$BENCHMARK_FILTER")
            fi
            arguments+=(--noplot)
            (cd "$worktree" && CARGO_TARGET_DIR="$target" "${arguments[@]}")
          }
          run_criterion base "$BASE_WORKTREE"
          run_criterion head "$HEAD_WORKTREE"
      - name: Verify detached checkouts remained unchanged
        shell: bash
        run: |
          set -euo pipefail
          test "$(git -C "$BASE_WORKTREE" rev-parse HEAD)" = "$BASE_SHA"
          test "$(git -C "$HEAD_WORKTREE" rev-parse HEAD)" = "$HEAD_SHA"
          test -z "$(git -C "$BASE_WORKTREE" status --porcelain --untracked-files=all)"
          test -z "$(git -C "$HEAD_WORKTREE" status --porcelain --untracked-files=all)"
      - name: Produce advisory-only comparison
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/compare_benchmarks.py \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --base "$RESULTS"/json/base/*.json \
            --head "$RESULTS"/json/head/*.json \
            --output "$RESULTS/comparison-v1.json" \
            --summary "$RESULTS/summary.md"
          cat "$RESULTS/summary.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload expiring advisory artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: advisory-performance-${{ inputs.base_sha }}-${{ inputs.head_sha }}
          path: |
            target/advisory-performance/json
            target/advisory-performance/comparison-v1.json
            target/advisory-performance/summary.md
            target/advisory-performance/criterion/base/criterion
            target/advisory-performance/criterion/head/criterion
          if-no-files-found: warn
          retention-days: 14
